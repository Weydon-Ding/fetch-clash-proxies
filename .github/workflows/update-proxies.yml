name: Update Clash Proxies

on:
  schedule:
    # 20:00 UTC = 04:00 Beijing time on the next day.
    - cron: "0 20 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Generate Clash config
        run: python fetch_clash_proxies.py -o clash-free-proxies.yaml

      - name: Commit and push changes
        run: |
          if git diff --quiet -- clash-free-proxies.yaml; then
            echo "No changes in clash-free-proxies.yaml."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add clash-free-proxies.yaml
          git commit -m "Update Clash proxy list"
          git push origin HEAD:main
