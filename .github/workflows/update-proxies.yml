name: Update Clash Proxies

on:
  schedule:
    # 20:00 UTC = 04:00 Beijing time on the next day.
    - cron: "0 20 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Generate Clash configs
        run: |
          mkdir -p publish
          python fetch_clash_proxies.py -o publish/clash-free-proxies.yaml

      - name: Move latest tag to current commit
        run: |
          git tag -f latest "$GITHUB_SHA"
          git push origin refs/tags/latest --force

      - name: Publish latest release asset
        uses: ncipollo/release-action@v1
        with:
          tag: latest
          name: Latest Clash Subscription
          artifacts: publish/clash-free-proxies.yaml,publish/clash-free-proxies-strict.yaml
          allowUpdates: true
          replacesArtifacts: true
